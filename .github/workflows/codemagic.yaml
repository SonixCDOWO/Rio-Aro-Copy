  # uses: codemagic-ci-cd/trigger-codemagic-workflow-action@ee629da88a5634bf1ff0c328e83d8d6fda8a2230
  uses: codemagic-ci-cd/trigger-codemagic-workflow-action@v2.0.0
  with:
    # Codemagic application ID
    app-id: 
    # Codemagic workflow ID
    workflow-id: 
    # Codemagic API token
    token: 
    # GitHub event branch override
